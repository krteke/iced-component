# Independent adwaita-like visual profile for Iced. It is not produced by,
# affiliated with, or endorsed by GNOME or libadwaita.
[meta]
name = "Adwaita-like Light"
mode = "light"
author = ""
version = "0.1.0"
description = "Independent adwaita-like light profile for currently implemented Iced components; no GNOME or libadwaita endorsement is implied."

[app.window]
bg = "#fafafb"
fg = "#000006cc"

[app.view]
bg = "#ffffff"
fg = "#000006cc"

[accent]
bg = "#3584e4"
fg = "#ffffff"
color = "#1c71d8"

[button]
min_width = "16px"
min_height = "24px"
base_padding_x = "10px"
padding_x = "17px"
padding_y = "5px"
image_min_width = "24px"
image_padding_x = "5px"
image_text_padding_x = "9px"
image_text_spacing = "4px"
image_text_label_padding_x = "2px"
icon_size = "16px"

[button.shape.rounded]
radius = "9px"

[button.shape.pill]
radius = "9999px"
padding_x = "28px"
padding_y = "9px"

[button.shape.circular]
radius = "9999px"
size = "36px"

[button.standard.idle]
bg = "#00000614"
fg = "{app.window.fg}"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.standard.hover]
bg = "#0000061f"

[button.standard.pressed]
bg = "#0000063d"

[button.standard.disabled]
bg = "{button.standard.idle.bg}"
fg = "{button.standard.idle.fg}"
border = "{button.standard.idle.border}"
border_width = "0px"
radius = "9px"

[button.flat.idle]
bg = "#00000000"
fg = "{app.window.fg}"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.flat.hover]
bg = "#0000060e"

[button.flat.pressed]
bg = "#00000621"

[button.flat.disabled]
bg = "#00000000"
fg = "#0000063d"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.suggested.idle]
bg = "{accent.bg}"
fg = "{accent.fg}"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.suggested.hover]
bg = "#4990e7"

[button.suggested.pressed]
bg = "#2a6ab8"

[button.suggested.disabled]
bg = "#3584e480"
fg = "#ffffff80"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.destructive.idle]
bg = "#c01c2826"
fg = "#c01c28"
border = "#00000000"
border_width = "0px"
radius = "9px"

[button.destructive.hover]
bg = "#c01c2833"

[button.destructive.pressed]
bg = "#c01c2859"

[button.destructive.disabled]
bg = "#c01c2814"
fg = "#c01c287a"
border = "#00000000"
border_width = "0px"
radius = "9px"

[spinner]
foreground = "#8c8c90"
track = "#eaeaeb"
size = "16px"
minimum_size = "12px"
maximum_size = "72px"
minimum_stroke = "2px"
maximum_stroke = "7px"
