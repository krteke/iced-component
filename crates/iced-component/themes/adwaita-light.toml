[meta]
name = "Aura Adwaita Light"
mode = "light"
author = "Aura Iced Component"
version = "0.1.0"
description = "Muted Adwaita-like baseline for Aura Iced components."

[app]
bg = "#f6f5f4"
fg = "#241f31"
fg_muted = "#5e5c64"

[control.border]
width = "1px"

[control.surface]
padding = "0px"

[control.button]
padding_x = "14px"
padding_y = "8px"

[control.icon_button]
size = "40px"
icon_size = "16px"

[panel.regular]
padding = "18px"
spacing = "12px"
title_size = "17px"

[surface.background.idle]
bg = "{app.bg}"
fg = "{app.fg}"
border = "#00000000"
border_width = "0px"
radius = "0px"

[surface.background.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[surface.regular.idle]
bg = "#ffffff"
fg = "{app.fg}"
border = "#0000001f"
border_width = "1px"
radius = "8px"

[surface.regular.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[surface.regular.hover]
bg = "#f7f7f7"

[surface.raised.idle]
bg = "#fafafa"
fg = "{app.fg}"
border = "{surface.regular.idle.border}"
border_width = "1px"
radius = "8px"

[surface.raised.idle.shadow]
color = "#00000024"
offset_x = "0px"
offset_y = "2px"
blur = "10px"
spread = "0px"

[surface.raised.hover]
bg = "#f1f1f1"

[button.shape.rounded]
radius = "9px"

[button.shape.pill]
radius = "999px"

[button.shape.circular]
radius = "999px"

[button.standard_filled.idle]
bg = "{surface.raised.idle.bg}"
fg = "{app.fg}"
border = "{surface.regular.idle.border}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.standard_filled.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.standard_filled.hover]
bg = "#f1f1f1"

[button.standard_filled.pressed]
bg = "#e9e9e9"

[button.standard_filled.disabled]
bg = "{app.bg}"
fg = "#5e5c6499"
border = "#00000014"

[button.standard_flat.idle]
bg = "#00000000"
fg = "{app.fg}"
border = "#00000000"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.standard_flat.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.standard_flat.hover]
bg = "#00000012"

[button.standard_flat.pressed]
bg = "#0000001f"

[button.standard_flat.disabled]
bg = "#00000000"
fg = "{button.standard_filled.disabled.fg}"
border = "#00000000"

[button.standard_raised.idle]
bg = "{surface.raised.idle.bg}"
fg = "{app.fg}"
border = "{surface.regular.idle.border}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.standard_raised.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.standard_raised.hover]
bg = "#f1f1f1"

[button.standard_raised.pressed]
bg = "#e9e9e9"

[button.standard_raised.disabled]
bg = "{app.bg}"
fg = "{button.standard_filled.disabled.fg}"
border = "#00000014"

[button.suggested_filled.idle]
bg = "#3584e4"
fg = "#ffffff"
border = "{button.suggested_filled.idle.bg}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.suggested_filled.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.suggested_filled.hover]
bg = "#1c71d8"
border = "{button.suggested_filled.hover.bg}"

[button.suggested_filled.pressed]
bg = "#1a5fb4"
border = "{button.suggested_filled.pressed.bg}"

[button.suggested_filled.disabled]
bg = "#d7d7d7"
fg = "{button.standard_filled.disabled.fg}"
border = "{button.suggested_filled.disabled.bg}"

[button.suggested_flat.idle]
bg = "#00000000"
fg = "#1c71d8"
border = "#00000000"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.suggested_flat.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.suggested_flat.hover]
bg = "#3584e41a"

[button.suggested_flat.pressed]
bg = "#3584e433"
fg = "#1a5fb4"

[button.suggested_flat.disabled]
bg = "#00000000"
fg = "{button.standard_filled.disabled.fg}"
border = "#00000000"

[button.suggested_raised.idle]
bg = "{button.suggested_filled.idle.bg}"
fg = "{button.suggested_filled.idle.fg}"
border = "{button.suggested_filled.idle.border}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.suggested_raised.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.suggested_raised.hover]
bg = "{button.suggested_filled.hover.bg}"
border = "{button.suggested_filled.hover.border}"

[button.suggested_raised.pressed]
bg = "{button.suggested_filled.pressed.bg}"
border = "{button.suggested_filled.pressed.border}"

[button.suggested_raised.disabled]
bg = "{button.suggested_filled.disabled.bg}"
fg = "{button.suggested_filled.disabled.fg}"
border = "{button.suggested_filled.disabled.border}"

[button.destructive_filled.idle]
bg = "#e01b24"
fg = "#ffffff"
border = "{button.destructive_filled.idle.bg}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.destructive_filled.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.destructive_filled.hover]
bg = "#c01c28"
border = "{button.destructive_filled.hover.bg}"

[button.destructive_filled.pressed]
bg = "#a51d2d"
border = "{button.destructive_filled.pressed.bg}"

[button.destructive_filled.disabled]
bg = "{button.suggested_filled.disabled.bg}"
fg = "{button.standard_filled.disabled.fg}"
border = "{button.destructive_filled.disabled.bg}"

[button.destructive_flat.idle]
bg = "#00000000"
fg = "#c01c28"
border = "#00000000"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.destructive_flat.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.destructive_flat.hover]
bg = "#e01b241a"

[button.destructive_flat.pressed]
bg = "#e01b2433"
fg = "#a51d2d"

[button.destructive_flat.disabled]
bg = "#00000000"
fg = "{button.standard_filled.disabled.fg}"
border = "#00000000"

[button.destructive_raised.idle]
bg = "{button.destructive_filled.idle.bg}"
fg = "{button.destructive_filled.idle.fg}"
border = "{button.destructive_filled.idle.border}"
border_width = "1px"
radius = "9px"
focus_ring = "#1c71d8"

[button.destructive_raised.idle.shadow]
color = "#00000000"
offset_x = "0px"
offset_y = "0px"
blur = "0px"
spread = "0px"

[button.destructive_raised.hover]
bg = "{button.destructive_filled.hover.bg}"
border = "{button.destructive_filled.hover.border}"

[button.destructive_raised.pressed]
bg = "{button.destructive_filled.pressed.bg}"
border = "{button.destructive_filled.pressed.border}"

[button.destructive_raised.disabled]
bg = "{button.destructive_filled.disabled.bg}"
fg = "{button.destructive_filled.disabled.fg}"
border = "{button.destructive_filled.disabled.border}"
